# Configuración Nginx para liga3d.appchinni.com
# Copiar a: /etc/nginx/sites-available/liga3d
# Luego: sudo ln -s /etc/nginx/sites-available/liga3d /etc/nginx/sites-enabled/
# Luego: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name liga3d.appchinni.com;

    # Redirigir todo a HTTPS una vez que tengas el certificado SSL
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Archivos de perfil con caché larga
    location /uploads/ {
        alias  /var/www/liga3d/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

